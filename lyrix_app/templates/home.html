<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>
    <h1>User List</h1>
    
    <ul>
        {% for user in users %}
            <li>{{ user.first_name }} {{ user.last_name }} - {{ user.email }}</li>
        {% empty %}
            <li>No users added yet.</li>
        {% endfor %}
    </ul>
    
    <a href="{% url 'add_user' %}">Add a new user</a>
</body>
</html>
