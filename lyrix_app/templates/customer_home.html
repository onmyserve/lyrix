<!-- myapp/templates/myapp/home.html -->
<h1>Customer List</h1>

<ul>
    {% for customer in customers %}
        <li>{{ customer.first_name }} {{ customer.last_name }} - {{ customer.email }}</li>
    {% empty %}
        <li>No customers added yet.</li>
    {% endfor %}
</ul>

<!-- This button redirects to the URL named 'add_customer' -->
<a href="{% url 'add_customer' %}">
    <button type="button">Add New Customer</button>
</a>
