{% extends 'base_auth.html' %}

{% block title %}Manage Database - Lyrix Enterprise CRM{% endblock %}

{% block auth_content %}
<div class="bg-white rounded-2xl shadow-xl p-8">
  <!-- Database config form goes here -->
  <h1 class="text-2xl font-bold mb-6">Manage Database</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-primary text-white px-4 py-2 rounded">Save</button>
  </form>
</div>
{% endblock %}
